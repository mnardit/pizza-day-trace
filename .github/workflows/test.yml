name: tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
          pip install pytest

      - name: Run invariant tests
        run: pytest -q tests/

      - name: Verify processed CSVs do not contradict committed dataset
        # We don't rerun the trace (it depends on a live API), but the committed
        # CSVs are loaded by some tests, which would fail if schema drifted.
        run: pytest -q tests/test_trace_invariants.py
